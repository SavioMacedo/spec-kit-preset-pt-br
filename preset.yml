schema_version: "1.0"

preset:
  id: "pt-br"
  name: "Português Brasileiro"
  version: "2.0.0"
  description: "Traduz artefatos SDD para pt-BR e usa vscode_askQuestions nos commands specify e clarify."
  author: "SavioMacedo"
  repository: "https://github.com/SavioMacedo/spec-kit-preset-pt-br"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      strategy: "wrap"
      description: "Wrapper pt-BR para template de constituição do projeto"

    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      strategy: "wrap"
      description: "Wrapper pt-BR para template de especificação de feature"

    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      strategy: "wrap"
      description: "Wrapper pt-BR para template de plano de implementação"

    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      strategy: "wrap"
      description: "Wrapper pt-BR para template de lista de tarefas"

    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      strategy: "wrap"
      description: "Wrapper pt-BR para template de checklist de qualidade"

    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      strategy: "wrap"
      description: "Wrapper pt-BR + vscode_askQuestions para command specify"

    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      strategy: "wrap"
      description: "Wrapper pt-BR + vscode_askQuestions para command clarify"

tags:
  - "language"
  - "composition"
  - "portuguese"
  - "pt-br"
  - "localization"
  - "brazilian-portuguese"
